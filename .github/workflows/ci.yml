name: CI

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "CITATION.cff"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/dependabot.yml"
      - ".github/workflows/security.yml"
  push:
    branches:
      - main
      - world-class-polish
    paths-ignore:
      - "**/*.md"
      - "CITATION.cff"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".github/dependabot.yml"
      - ".github/workflows/security.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest
      - name: Run tests
        run: pytest -q
      - name: Verify evidence-graded report
        run: |
          python validate.py --format json --output validation-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("validation-report.json").read_text(encoding="utf-8"))
          assert report["schema_version"] == 1
          assert report["summary"]["total"] == 20
          assert report["summary"]["failed"] == 0
          allowed = {"literature", "physical_bound", "invariant", "smoke"}
          assert {item["evidence"]["level"] for item in report["checks"]} <= allowed
          assert all(item["evidence"]["quantity"] for item in report["checks"])
          assert all(item["evidence"]["unit"] for item in report["checks"])
          assert all(item["evidence"]["criterion"] for item in report["checks"])
          assert all(item["evidence"]["reference"] for item in report["checks"])
          PY
