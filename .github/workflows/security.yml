name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - world-class-polish
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Block tracked secret files
        shell: bash
        run: |
          set -euo pipefail
          blocked=$(git ls-files | grep -E '(^|/)(\.env(\..*)?|id_rsa|id_ed25519)$|\.(pem|key|p12|pfx)$' || true)
          if [ -n "$blocked" ]; then
            echo "Tracked secret-like files detected:"
            echo "$blocked"
            exit 1
          fi

      - name: Scan tracked text for common secret patterns
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE '(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|github_pat_[A-Za-z0-9_]{82}|AIza[0-9A-Za-z\-_]{35}|xox[baprs]-[A-Za-z0-9-]{10,}|-----BEGIN (RSA|EC|OPENSSH|DSA|PGP) PRIVATE KEY-----)' -- . ':(exclude)SECURITY.md'; then
            echo "Potential secret material detected in tracked files."
            exit 1
          fi

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
          python -m pip install -r requirements.txt

      - name: Dependency integrity check
        run: python -m pip check

      - name: Audit dependencies
        run: pip-audit --progress-spinner off -r requirements.txt
